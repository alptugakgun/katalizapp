<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Kayıt - KatalizApp</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #fffcf5 0%, #ffece0 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        .bg-shape-1 { position: absolute; top: -10%; left: -10%; width: 300px; height: 300px; background: #ff7a7a; border-radius: 50%; opacity: 0.1; filter: blur(40px); z-index: -1; animation: floatShape 10s infinite alternate;}
        .bg-shape-2 { position: absolute; bottom: -10%; right: -10%; width: 400px; height: 400px; background: #a855f7; border-radius: 50%; opacity: 0.1; filter: blur(50px); z-index: -1; animation: floatShape 12s infinite alternate-reverse;}
        @keyframes floatShape { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px, 30px) scale(1.2); } }
        
        .login-box { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.05); 
            width: 350px; 
            text-align: center; 
            border: 2px solid #ffffff; 
            z-index: 1;
        }
        
        .logo { font-size: 50px; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h1 { color: #1e293b; font-weight: 900; margin-bottom: 10px; font-size: 24px; }
        p { color: #64748b; font-weight: 800; font-size: 14px; margin-bottom: 25px; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 18px; 
            border: 2px solid #f1f5f9; 
            outline: none; 
            font-family: inherit; 
            font-weight: 800; 
            box-sizing: border-box; 
            background: #f8fafc; 
            transition: 0.3s; 
            color: #334155;
        }
        input:focus { border-color: #3b82f6; background: #fff; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            border-radius: 18px; 
            border: none; 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            font-weight: 900; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); 
            margin-top: 10px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3); }
        
        .footer-links { margin-top: 25px; font-size: 13px; font-weight: 800; color: #64748b; line-height: 1.8;}
        a { color: #3b82f6; text-decoration: none; font-weight: 900;}
    </style>
</head>
<body>
    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>
    
    <div class="login-box">
        <div class="logo">🚀</div>
        <h1>Öğrenci Kayıt</h1>
        <p>Koçunun davet koduyla maceraya başla!</p>
        
        <input type="text" id="ogrAd" placeholder="Kullanıcı Adı Belirle">
        <input type="password" id="ogrSifre" placeholder="Bir Şifre Belirle">
        <!-- BÜYÜK HARF UYARLAMASI EKLENDİ -->
        <input type="text" id="kocKodu" placeholder="Koçunun Davet Kodu" onkeypress="if(event.key === 'Enter') kayitOl()" oninput="this.value = this.value.toUpperCase()">
        
        <button onclick="kayitOl()">Hesabımı Oluştur</button>
        
        <div class="footer-links">
            Zaten hesabın var mı? <a href="login.html">Giriş Yap</a> <br>
            <a href="anasayfa.html" style="color:#94a3b8;">← Anasayfaya Dön</a>
        </div>
    </div>

    <script>
        async function kayitOl() {
            const ad = document.getElementById('ogrAd').value.trim();
            const sifre = document.getElementById('ogrSifre').value.trim();
            // GÜVENLİK: Arka planda da mecburi büyük harfe çevriliyor
            const kod = document.getElementById('kocKodu').value.trim().toUpperCase();
            
            if(!ad || !sifre || !kod) return alert("Lütfen tüm alanları doldur!");
            
            try {
                const res = await fetch('/api/kayit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ogrenciAd: ad, sifre: sifre, kocKodu: kod })
                });
                const data = await res.json();
                
                if(data.basari) {
                    alert("Kayıt başarılı! Şimdi giriş yapabilirsin.");
                    window.location.href = 'login.html';
                } else {
                    alert(data.mesaj);
                }
            } catch (e) {
                alert("Sunucuya bağlanırken bir hata oluştu!");
            }
        }
    </script>
</body>
</html>
