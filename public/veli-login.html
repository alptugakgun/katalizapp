<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veli Girişi - KatalizApp</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #faf5ff 0%, #fce7f3 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        .bg-shape-1 { position: absolute; top: -10%; left: -10%; width: 350px; height: 350px; background: #ec4899; border-radius: 50%; opacity: 0.1; filter: blur(50px); z-index: -1; animation: floatShape 10s infinite alternate;}
        .bg-shape-2 { position: absolute; bottom: -10%; right: -10%; width: 400px; height: 400px; background: #a855f7; border-radius: 50%; opacity: 0.1; filter: blur(60px); z-index: -1; animation: floatShape 12s infinite alternate-reverse;}
        @keyframes floatShape { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-30px, 30px) scale(1.1); } }
        
        .login-box { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.05); 
            width: 350px; 
            text-align: center; 
            border: 2px solid #ffffff; 
            z-index: 1;
        }
        
        .logo { font-size: 50px; margin-bottom: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        h1 { color: #1e293b; font-weight: 900; margin-bottom: 10px; font-size: 24px; }
        p { color: #64748b; font-weight: 800; font-size: 14px; margin-bottom: 25px;}
        
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 18px; 
            border: 2px solid #f1f5f9; 
            outline: none; 
            font-family: inherit; 
            font-weight: 900; 
            box-sizing: border-box; 
            background: #f8fafc; 
            transition: 0.3s; 
            color: #db2777;
            text-align: center;
            font-size: 18px;
            letter-spacing: 2px;
        }
        input:focus { border-color: #ec4899; background: #fff; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            border-radius: 18px; 
            border: none; 
            background: linear-gradient(135deg, #ec4899, #be185d); 
            color: white; 
            font-weight: 900; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.2); 
            margin-top: 10px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(236, 72, 153, 0.3); }
        
        .footer-links { margin-top: 25px; font-size: 13px; font-weight: 800; color: #64748b; line-height: 1.8;}
        a { color: #db2777; text-decoration: none; font-weight: 900;}
    </style>
</head>
<body>
    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>
    
    <div class="login-box">
        <div class="logo">👨‍👩‍👧‍👦</div>
        <h1>Veli Portalı</h1>
        <p>Öğrencinizin durumunu canlı takip edin.</p>
        
        <input type="text" id="veliKodu" placeholder="V-XXXX" onkeypress="if(event.key === 'Enter') veliGiris()">
        
        <button onclick="veliGiris()">Giriş Yap</button>
        
        <div class="footer-links">
            <a href="anasayfa.html" style="color:#94a3b8;">← Anasayfaya Dön</a>
        </div>
    </div>

    <script>
        async function veliGiris() {
            let kod = document.getElementById('veliKodu').value.trim().toUpperCase();
            
            if(!kod) return alert("Lütfen çocuğunuza ait Veli Takip Kodunu girin!");
            
            try {
                const res = await fetch('/api/veli/giris', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ veliKodu: kod })
                });
                const data = await res.json();
                
                if(data.basari) {
                    localStorage.setItem('veliKimligi', data.ogrenciAd);
                    localStorage.setItem('kocKodu', data.kocKodu);
                    window.location.href = 'veli.html';
                } else {
                    alert(data.mesaj);
                }
            } catch (e) {
                alert("Sunucuya bağlanırken bir hata oluştu!");
            }
        }
    </script>
</body>
</html>
